<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mantra Counter" />
  <meta name="theme-color" content="#1a0a2e" />
  <title>Mantra Counter 🕉️</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+Devanagari:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --deep-night: #0d0618;
      --midnight: #1a0a2e;
      --twilight: #2d1654;
      --gold: #c9a227;
      --gold-light: #f0c94d;
      --gold-dim: #8a6e1a;
      --saffron: #e8821a;
      --saffron-light: #ffb347;
      --cream: #f5ead0;
      --cream-dim: #c4b48a;
      --lotus: #d4689a;
      --turquoise: #3ecfcf;
      --glow: rgba(201, 162, 39, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; min-height: 100vh;
      background: var(--deep-night);
      color: var(--cream);
      font-family: 'Crimson Pro', Georgia, serif;
      overflow: hidden;
    }

    body {
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(232,130,26,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(62,207,207,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(45,22,84,0.9) 0%, var(--deep-night) 100%);
      min-height: 100vh;
    }

    /* Particle stars */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op); }
    }

    /* SCREENS */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      overflow-y: auto; z-index: 10;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

    /* ===== HOME SCREEN ===== */
    #home {
      padding-top: calc(env(safe-area-inset-top, 20px) + 20px);
      gap: 0;
    }

    .om-header {
      text-align: center;
      margin-bottom: 8px;
    }
    .om-symbol {
      font-size: 56px;
      line-height: 1;
      display: block;
      filter: drop-shadow(0 0 20px var(--gold));
      animation: om-pulse 3s ease-in-out infinite;
    }
    @keyframes om-pulse {
      0%, 100% { filter: drop-shadow(0 0 15px var(--gold)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 30px var(--gold-light)); transform: scale(1.05); }
    }
    .app-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 2px;
      margin-top: 6px;
      text-shadow: 0 0 20px var(--glow);
    }
    .app-subtitle {
      font-size: 13px;
      color: var(--cream-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Total banner */
    .total-banner {
      width: 100%;
      background: linear-gradient(135deg, rgba(201,162,39,0.15), rgba(232,130,26,0.1));
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 16px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 14px 0 10px;
    }
    .total-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cream-dim);
    }
    .total-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 24px;
      color: var(--gold-light);
      text-shadow: 0 0 10px var(--glow);
    }
    .total-divider { color: var(--gold-dim); font-size: 18px; }

    /* Sections */
    .section {
      width: 100%;
      margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    /* Mantra select */
    .mantra-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .mantra-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .mantra-item::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,162,39,0.1), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .mantra-item:active::before, .mantra-item.selected::before { opacity: 1; }
    .mantra-item.selected {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(201,162,39,0.25), inset 0 0 16px rgba(201,162,39,0.05);
    }
    .mantra-icon { font-size: 22px; flex-shrink: 0; }
    .mantra-info { flex: 1; min-width: 0; }
    .mantra-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 12px;
      color: var(--gold-light);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mantra-preview {
      font-size: 11px;
      color: var(--cream-dim);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-style: italic;
    }
    .mantra-check {
      width: 20px; height: 20px;
      border: 2px solid rgba(201,162,39,0.3);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      font-size: 11px;
    }
    .mantra-item.selected .mantra-check {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--deep-night);
    }

    /* Delete button on mantra */
    .mantra-delete {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(220, 60, 60, 0.15);
      border: 1px solid rgba(220, 60, 60, 0.3);
      color: #ff6b6b;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 4px;
      opacity: 0;
      transform: scale(0.8);
    }
    .mantra-item:hover .mantra-delete,
    .mantra-item.show-delete .mantra-delete {
      opacity: 1;
      transform: scale(1);
    }
    .mantra-delete:active {
      background: rgba(220, 60, 60, 0.35);
      border-color: #ff6b6b;
      transform: scale(0.9);
    }

    /* Edit mode toggle */
    .edit-toggle {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      font-family: 'Crimson Pro', serif;
      transition: color 0.2s;
    }
    .edit-toggle.active { color: #ff6b6b; }

    /* Confirm delete overlay */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: linear-gradient(180deg, var(--twilight), var(--midnight));
      border: 1px solid rgba(220,60,60,0.3);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      width: 100%; max-width: 320px;
      transform: scale(0.9);
      transition: transform 0.2s;
    }
    .confirm-overlay.open .confirm-box { transform: scale(1); }
    .confirm-icon { font-size: 36px; margin-bottom: 12px; }
    .confirm-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 15px;
      color: #ff6b6b;
      margin-bottom: 8px;
    }
    .confirm-msg {
      font-size: 14px;
      color: var(--cream-dim);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .confirm-mantra-name {
      color: var(--gold-light);
      font-style: italic;
    }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-delete {
      flex: 1;
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 12px;
      color: white;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .confirm-delete:active { opacity: 0.8; }
    .confirm-keep {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 12px;
      padding: 13px;
      font-size: 13px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      cursor: pointer;
    }

    /* Add custom mantra */
    .add-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(201,162,39,0.3);
      border-radius: 14px;
      padding: 10px;
      color: var(--gold-dim);
      font-size: 13px;
      font-family: 'Crimson Pro', serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .add-btn:active { border-color: var(--gold); color: var(--gold); }

    /* Count selector */
    .count-selector {
      display: flex; align-items: center; gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 14px;
      overflow: hidden;
    }
    .count-btn {
      width: 50px; height: 50px;
      background: transparent;
      border: none;
      color: var(--gold);
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Cinzel Decorative', serif;
    }
    .count-btn:active { background: rgba(201,162,39,0.15); }
    .count-display {
      flex: 1; text-align: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      color: var(--gold-light);
    }
    .count-presets {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .preset-btn {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 10px;
      padding: 7px 0;
      color: var(--cream-dim);
      font-size: 12px;
      font-family: 'Crimson Pro', serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-btn:active, .preset-btn.active {
      background: rgba(201,162,39,0.15);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    /* Start button */
    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      border: none;
      border-radius: 18px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--deep-night);
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(232,130,26,0.4);
      transition: all 0.2s;
      margin-top: 4px;
      margin-bottom: 10px;
    }
    .start-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(232,130,26,0.3); }

    /* ===== COUNTER SCREEN ===== */
    #counter {
      padding-top: calc(env(safe-area-inset-top, 20px) + 10px);
      justify-content: space-between;
    }

    .counter-top {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
    }

    .counter-header {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 10px;
      width: 40px; height: 40px;
      color: var(--gold);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .back-btn:active { background: rgba(201,162,39,0.15); }

    .counter-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-align: center;
    }

    .total-pill {
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--cream-dim);
      letter-spacing: 1px;
    }
    .total-pill span {
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold-light);
      font-size: 14px;
    }

    /* Progress ring */
    .progress-ring-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0 4px;
    }
    .progress-ring-svg { transform: rotate(-90deg); }
    .progress-bg { fill: none; stroke: rgba(201,162,39,0.12); }
    .progress-fill {
      fill: none;
      stroke: url(#goldGrad);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease;
    }
    .ring-inner {
      position: absolute;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .current-count {
      font-family: 'Cinzel Decorative', serif;
      font-size: 52px;
      color: var(--gold-light);
      line-height: 1;
      text-shadow: 0 0 30px rgba(201,162,39,0.6);
      transition: transform 0.1s ease;
    }
    .current-count.bump { animation: bump 0.15s ease; }
    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .count-of {
      font-size: 12px; color: var(--cream-dim); letter-spacing: 1px; margin-top: 2px;
      cursor: pointer;
      border-bottom: 1px dashed rgba(201,162,39,0.4);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .count-of:active { color: var(--gold); }

    /* Inline count editor inside ring */
    .count-edit-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .count-edit-wrap.show { display: flex; }
    .count-edit-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--gold);
      border-radius: 10px;
      color: var(--gold-light);
      font-family: 'Cinzel Decorative', serif;
      font-size: 28px;
      width: 90px;
      text-align: center;
      padding: 4px 0;
      outline: none;
    }
    .count-edit-ok {
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      border: none;
      border-radius: 8px;
      padding: 5px 16px;
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      color: var(--deep-night);
      cursor: pointer;
      letter-spacing: 1px;
    }

    /* Mantra text */
    .mantra-card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,162,39,0.15);
      border-radius: 20px;
      padding: 14px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .mantra-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .mantra-card-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      color: var(--gold-dim);
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .mantra-text {
      font-family: 'Noto Serif Devanagari', 'Crimson Pro', serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--cream);
      font-style: italic;
      max-height: 90px;
      overflow-y: auto;
    }

    /* Beads */
    .mala-beads {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      width: 100%;
      padding: 6px 0;
    }
    .bead {
      width: var(--bead-size, 16px); height: var(--bead-size, 16px);
      border-radius: 50%;
      background: rgba(201,162,39,0.12);
      border: 1px solid rgba(201,162,39,0.2);
      transition: all 0.3s ease;
      position: relative;
    }
    .bead.lit {
      background: radial-gradient(circle, var(--gold-light), var(--saffron));
      border-color: var(--gold-light);
      box-shadow: 0 0 8px rgba(201,162,39,0.6);
      animation: bead-glow 0.3s ease;
    }
    @keyframes bead-glow {
      0% { transform: scale(0.8); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Plus counter button */
    .counter-bottom {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      gap: 12px;
      padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 8px);
    }

    .completed-banner {
      background: linear-gradient(135deg, rgba(62,207,207,0.15), rgba(201,162,39,0.1));
      border: 1px solid rgba(62,207,207,0.4);
      border-radius: 14px;
      padding: 10px 20px;
      text-align: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      color: var(--turquoise);
      letter-spacing: 1px;
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .completed-banner.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* Round badge */
    .round-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(62,207,207,0.1);
      border: 1px solid rgba(62,207,207,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--turquoise);
      letter-spacing: 1px;
      margin-top: 2px;
      transition: all 0.3s;
    }
    .round-badge.pulse { animation: roundPulse 0.5s ease; }
    @keyframes roundPulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.18); background: rgba(62,207,207,0.25); }
      100% { transform: scale(1); }
    }

    .tap-btn {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--saffron-light), var(--saffron), #c0521a);
      border: none;
      cursor: pointer;
      box-shadow:
        0 0 0 8px rgba(232,130,26,0.1),
        0 0 0 16px rgba(232,130,26,0.05),
        0 8px 32px rgba(232,130,26,0.5);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
      transition: all 0.1s ease;
      position: relative;
      overflow: hidden;
    }
    .tap-btn::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.35), transparent 60%);
    }
    .tap-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 0 4px rgba(232,130,26,0.1), 0 4px 16px rgba(232,130,26,0.4);
    }
    .tap-plus { font-size: 36px; color: white; font-weight: 300; line-height: 1; }
    .tap-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.8); text-transform: uppercase; }

    .action-row {
      display: flex; gap: 12px; width: 100%;
    }
    .action-btn {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 14px;
      padding: 12px 0;
      color: var(--cream-dim);
      font-size: 12px;
      font-family: 'Crimson Pro', serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .action-btn:active { background: rgba(201,162,39,0.1); border-color: var(--gold); }
    .action-btn .icon { font-size: 18px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 480px;
      background: linear-gradient(180deg, var(--twilight), var(--midnight));
      border: 1px solid rgba(201,162,39,0.25);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px calc(env(safe-area-inset-bottom, 20px) + 20px);
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      color: var(--gold-light);
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 1px;
    }
    .input-group { margin-bottom: 12px; }
    .input-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
      display: block;
    }
    .modal input, .modal textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--cream);
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--gold); }
    .modal textarea { min-height: 90px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-save {
      flex: 2;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      color: var(--deep-night);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-save:active { opacity: 0.8; }
    .modal-cancel {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 14px;
      padding: 14px;
      font-size: 13px;
      color: var(--cream-dim);
      font-family: 'Crimson Pro', serif;
      cursor: pointer;
    }

    /* Ripple */
    .ripple {
      position: fixed; pointer-events: none; z-index: 9999;
      border-radius: 50%;
      background: rgba(201,162,39,0.5);
      animation: ripple-out 0.5s ease forwards;
      transform: translate(-50%, -50%);
    }
    @keyframes ripple-out {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 80px; height: 80px; opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen" id="home">
  <div class="om-header">
    <span class="om-symbol">🕉️</span>
    <div class="app-title">Mantra Counter</div>
    <div class="app-subtitle">Sacred Japa Practice</div>
  </div>

  <!-- Total count banner -->
  <div class="total-banner">
    <span class="total-label">Total Chants</span>
    <span class="total-divider">·</span>
    <span class="total-value" id="homeTotal">0</span>
  </div>

  <!-- Choose Mantra -->
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px">
      <div class="section-label" style="margin-bottom:0">✦ Choose Your Mantra</div>
      <button class="edit-toggle" id="editToggle">EDIT</button>
    </div>
    <div class="mantra-list" id="mantraList"></div>
    <button class="add-btn" id="addMantraBtn" style="margin-top:8px">
      ✦ Add Custom Mantra
    </button>
  </div>

  <!-- Choose Count -->
  <div class="section">
    <div class="section-label">✦ Set Count Goal</div>
    <div class="count-selector">
      <button class="count-btn" id="countDown">−</button>
      <span class="count-display" id="countDisplay">108</span>
      <button class="count-btn" id="countUp">+</button>
    </div>
    <div class="count-presets">
      <button class="preset-btn" data-val="11">11</button>
      <button class="preset-btn active" data-val="108">108</button>
      <button class="preset-btn" data-val="216">216</button>
      <button class="preset-btn" data-val="1008">1008</button>
    </div>
  </div>

  <!-- Start -->
  <button class="start-btn" id="startBtn">🕉 Begin Practice</button>
</div>

<!-- ===== COUNTER SCREEN ===== -->
<div class="screen hidden" id="counter">
  <div class="counter-top">
    <div class="counter-header" style="width:100%">
      <button class="back-btn" id="backBtn">←</button>
      <div class="counter-title" id="counterTitle">PRACTICE</div>
      <div class="total-pill">Total: <span id="counterTotal">0</span></div>
    </div>

    <!-- Progress ring -->
    <div class="progress-ring-wrap">
      <svg class="progress-ring-svg" width="200" height="200" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f0c94d"/>
            <stop offset="100%" style="stop-color:#e8821a"/>
          </linearGradient>
        </defs>
        <circle class="progress-bg" cx="100" cy="100" r="88" stroke-width="8"/>
        <circle class="progress-fill" id="progressCircle" cx="100" cy="100" r="88"
          stroke-width="8"
          stroke-dasharray="553"
          stroke-dashoffset="553"/>
      </svg>
      <div class="ring-inner">
        <div class="current-count" id="currentCount">0</div>
        <div class="count-of" id="countOf" title="Tap to edit">of 108 ✎</div>
        <div class="count-edit-wrap" id="countEditWrap">
          <input class="count-edit-input" type="number" id="countEditInput" min="1" max="9999" value="108"/>
          <button class="count-edit-ok" id="countEditOk">Set</button>
        </div>
      </div>
    </div>
    <div class="round-badge" id="roundBadge">🔄 Round 1</div>

    <!-- Mantra text -->
    <div class="mantra-card">
      <div class="mantra-card-name" id="activeMantraName">—</div>
      <div class="mantra-text" id="activeMantraText">—</div>
    </div>

    <!-- Bead tracker (108 max shown as 27) -->
    <div class="mala-beads" id="malaBeads"></div>
  </div>

  <div class="counter-bottom">
    <div class="completed-banner" id="completedBanner">
      ✦ Mantra Complete ✦ Shubham Bhavatu ✦
    </div>
    <button class="tap-btn" id="tapBtn">
      <span class="tap-plus">+</span>
      <span class="tap-label">Chant</span>
    </button>
    <div class="action-row">
      <button class="action-btn" id="resetBtn">
        <span class="icon">↺</span>
        <span>Reset</span>
      </button>
      <button class="action-btn" id="doneBtn">
        <span class="icon">✓</span>
        <span>Done</span>
      </button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Remove Mantra?</div>
    <div class="confirm-msg">Are you sure you want to remove<br><span class="confirm-mantra-name" id="confirmMantraName"></span>?</div>
    <div class="confirm-actions">
      <button class="confirm-keep" id="confirmKeep">Keep It</button>
      <button class="confirm-delete" id="confirmDelete">Remove</button>
    </div>
  </div>
</div>

<!-- Modal: Add Custom Mantra -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">✦ Add Custom Mantra ✦</div>
    <div class="input-group">
      <label class="input-label">Mantra Name</label>
      <input type="text" id="newMantraName" placeholder="e.g. Gayatri Mantra" />
    </div>
    <div class="input-group">
      <label class="input-label">Mantra Text</label>
      <textarea id="newMantraText" placeholder="Om Bhur Bhuvah Swaha..."></textarea>
    </div>
    <div class="input-group">
      <label class="input-label">Icon (emoji)</label>
      <input type="text" id="newMantraIcon" placeholder="🌺" maxlength="2" />
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-save" id="modalSave">Save Mantra</button>
    </div>
  </div>
</div>

<script>
// ===== DEFAULT MANTRAS =====
const DEFAULT_MANTRAS = [
  {
    id: 1, icon: '🕉️', name: 'Om Mantra',
    text: 'ॐ\nOm – The primordial sound of the universe, the source of all creation.'
  },
  {
    id: 2, icon: '☀️', name: 'Gayatri Mantra',
    text: 'ॐ भूर्भुवः स्वः\nतत्सवितुर्वरेण्यं\nभर्गो देवस्यः धीमहि\nधियो यो नः प्रचोदयात्'
  },
  {
    id: 3, icon: '🐘', name: 'Ganesh Mantra',
    text: 'ॐ गं गणपतये नमः\nOm Gam Ganapataye Namaha\nSalutations to Lord Ganesha, remover of obstacles.'
  },
  {
    id: 4, icon: '🌊', name: 'Mahamrityunjaya',
    text: 'ॐ त्र्यम्बकं यजामहे\nसुगन्धिं पुष्टिवर्धनम्\nउर्वारुकमिव बन्धनान्\nमृत्योर्मुक्षीय माऽमृतात्'
  },
  {
    id: 5, icon: '🪷', name: 'So Hum',
    text: 'सो ऽहम्\nSo Hum – "I am That"\nThe mantra of the breath, uniting individual self with universal consciousness.'
  }
];

// ===== STATE =====
let state = {
  mantras: JSON.parse(localStorage.getItem('mantras') || 'null') || DEFAULT_MANTRAS,
  selectedMantraId: null,
  targetCount: 108,
  currentCount: 0,
  currentRound: 1,
  totalCount: parseInt(localStorage.getItem('totalCount') || '0'),
};

function saveState() {
  localStorage.setItem('mantras', JSON.stringify(state.mantras));
  localStorage.setItem('totalCount', state.totalCount);
}

// ===== STARS =====
function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --op:${0.3+Math.random()*0.6};
      animation-delay:${Math.random()*5}s;
    `;
    c.appendChild(s);
  }
}

// ===== EDIT MODE =====
let editMode = false;
let pendingDeleteId = null;

document.getElementById('editToggle').addEventListener('click', () => {
  editMode = !editMode;
  document.getElementById('editToggle').classList.toggle('active', editMode);
  document.getElementById('editToggle').textContent = editMode ? 'DONE' : 'EDIT';
  renderMantras();
});

// ===== RENDER MANTRAS =====
function renderMantras() {
  const list = document.getElementById('mantraList');
  list.innerHTML = '';
  state.mantras.forEach(m => {
    const el = document.createElement('div');
    el.className = 'mantra-item show-delete' + (state.selectedMantraId === m.id ? ' selected' : '');
    el.innerHTML = `
      ${editMode ? `<button class="mantra-delete" data-id="${m.id}" title="Delete">✕</button>` : ''}
      <span class="mantra-icon">${m.icon}</span>
      <div class="mantra-info">
        <div class="mantra-name">${m.name}</div>
        <div class="mantra-preview">${m.text.split('\n')[0].substring(0, 40)}…</div>
      </div>
      ${!editMode ? `<div class="mantra-check">${state.selectedMantraId === m.id ? '✓' : ''}</div>` : ''}
    `;
    if (!editMode) {
      el.addEventListener('click', () => {
        state.selectedMantraId = m.id;
        renderMantras();
      });
    }
    // Delete button
    const delBtn = el.querySelector('.mantra-delete');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        pendingDeleteId = m.id;
        document.getElementById('confirmMantraName').textContent = m.name;
        document.getElementById('confirmOverlay').classList.add('open');
      });
    }
    list.appendChild(el);
  });
}

// ===== COUNT SELECTOR =====
function updateCountDisplay() {
  document.getElementById('countDisplay').textContent = state.targetCount;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === state.targetCount);
  });
}

document.getElementById('countDown').addEventListener('click', () => {
  if (state.targetCount > 1) { state.targetCount--; updateCountDisplay(); }
});
document.getElementById('countUp').addEventListener('click', () => {
  state.targetCount++; updateCountDisplay();
});
document.querySelectorAll('.preset-btn').forEach(b => {
  b.addEventListener('click', () => {
    state.targetCount = parseInt(b.dataset.val);
    updateCountDisplay();
  });
});

// ===== HOME TOTAL =====
function updateHomeTotals() {
  document.getElementById('homeTotal').textContent = state.totalCount.toLocaleString();
}

// ===== MALA BEADS =====
function buildBeads() {
  const wrap = document.getElementById('malaBeads');
  wrap.innerHTML = '';
  const total = state.targetCount;

  // Dynamically size beads so they fit nicely regardless of count
  // Max ~54 visible beads; for higher counts group them
  let beadCount, groupSize;
  if (total <= 27) {
    beadCount = total; groupSize = 1;
  } else if (total <= 54) {
    beadCount = total; groupSize = 1;
  } else if (total <= 108) {
    beadCount = Math.min(total, 54); groupSize = Math.ceil(total / beadCount);
  } else if (total <= 216) {
    beadCount = 54; groupSize = Math.ceil(total / 54);
  } else {
    beadCount = 54; groupSize = Math.ceil(total / 54);
  }

  // Bead size: fewer beads = bigger
  let beadSize = 16;
  if (beadCount <= 11) beadSize = 24;
  else if (beadCount <= 27) beadSize = 18;
  else if (beadCount <= 54) beadSize = 14;
  else beadSize = 12;

  wrap.style.setProperty('--bead-size', beadSize + 'px');
  wrap.style.gap = (beadSize <= 12 ? '3px' : '4px');

  for (let i = 0; i < beadCount; i++) {
    const b = document.createElement('div');
    const filledUpTo = Math.floor(state.currentCount / groupSize);
    b.className = 'bead' + (i < filledUpTo ? ' lit' : '');
    b.id = `bead-${i}`;
    wrap.appendChild(b);
  }

  // Store for lightBead
  wrap._beadCount = beadCount;
  wrap._groupSize = groupSize;
}

function lightBead(currentVal) {
  const wrap = document.getElementById('malaBeads');
  const groupSize = wrap._groupSize || 1;
  const beadIdx = Math.floor((currentVal - 1) / groupSize);
  const b = document.getElementById(`bead-${beadIdx}`);
  if (b && !b.classList.contains('lit')) b.classList.add('lit');
}

// ===== EDIT COUNT IN COUNTER SCREEN =====
document.getElementById('countOf').addEventListener('click', () => {
  document.getElementById('countEditInput').value = state.targetCount;
  document.getElementById('countOf').style.display = 'none';
  document.getElementById('currentCount').style.display = 'none';
  document.getElementById('countEditWrap').classList.add('show');
  document.getElementById('countEditInput').focus();
});

function applyCountEdit() {
  const val = parseInt(document.getElementById('countEditInput').value);
  if (!val || val < 1) return;
  state.targetCount = val;
  state.currentCount = 0;
  state.currentRound = 1;
  document.getElementById('countEditWrap').classList.remove('show');
  document.getElementById('countOf').style.display = '';
  document.getElementById('currentCount').style.display = '';
  document.getElementById('completedBanner').classList.remove('show');
  buildBeads();
  updateProgress();
}

document.getElementById('countEditOk').addEventListener('click', applyCountEdit);
document.getElementById('countEditInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applyCountEdit();
});

// ===== PROGRESS =====
const CIRCUM = 553;
function updateProgress() {
  const pct = state.targetCount > 0 ? Math.min(state.currentCount / state.targetCount, 1) : 0;
  const offset = CIRCUM - pct * CIRCUM;
  document.getElementById('progressCircle').style.strokeDashoffset = offset;
  document.getElementById('currentCount').textContent = state.currentCount;
  document.getElementById('countOf').textContent = `of ${state.targetCount}`;
  document.getElementById('counterTotal').textContent = state.totalCount.toLocaleString();
  document.getElementById('roundBadge').textContent = `🔄 Round ${state.currentRound}`;
}

// ===== START =====
document.getElementById('startBtn').addEventListener('click', () => {
  if (!state.selectedMantraId) {
    // auto-select first
    state.selectedMantraId = state.mantras[0].id;
    renderMantras();
  }
  const mantra = state.mantras.find(m => m.id === state.selectedMantraId);
  state.currentCount = 0;
  state.currentRound = 1;
  document.getElementById('activeMantraName').textContent = mantra.name;
  document.getElementById('activeMantraText').textContent = mantra.text;
  document.getElementById('counterTitle').textContent = mantra.name.toUpperCase();
  document.getElementById('completedBanner').classList.remove('show');
  buildBeads();
  updateProgress();
  showScreen('counter');
});

// ===== TAP BUTTON =====
document.getElementById('tapBtn').addEventListener('click', (e) => {
  state.currentCount++;
  state.totalCount++;
  saveState();

  // Check if a round just completed
  if (state.currentCount > 0 && state.currentCount % state.targetCount === 0) {
    state.currentRound++;
    // Flash completed banner briefly then reset beads
    document.getElementById('completedBanner').classList.add('show');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
    setTimeout(() => {
      document.getElementById('completedBanner').classList.remove('show');
      state.currentCount = 0;
      buildBeads();
      updateProgress();
      // Pulse the round badge
      const badge = document.getElementById('roundBadge');
      badge.classList.remove('pulse');
      void badge.offsetWidth;
      badge.classList.add('pulse');
    }, 900);
  } else {
    lightBead(state.currentCount % state.targetCount || state.targetCount);
    if (navigator.vibrate) navigator.vibrate(10);
  }

  updateProgress();
  updateHomeTotals();

  // bump animation
  const el = document.getElementById('currentCount');
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');

  // ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 500);
});

// ===== RESET =====
document.getElementById('resetBtn').addEventListener('click', () => {
  state.currentCount = 0;
  state.currentRound = 1;
  document.getElementById('completedBanner').classList.remove('show');
  buildBeads();
  updateProgress();
});

// ===== DONE =====
document.getElementById('doneBtn').addEventListener('click', () => {
  showScreen('home');
  updateHomeTotals();
});

// ===== BACK =====
document.getElementById('backBtn').addEventListener('click', () => {
  showScreen('home');
  updateHomeTotals();
});

// ===== SCREEN TRANSITIONS =====
function showScreen(name) {
  document.getElementById('home').classList.toggle('hidden', name !== 'home');
  document.getElementById('counter').classList.toggle('hidden', name !== 'counter');
}

// ===== CONFIRM DELETE =====
document.getElementById('confirmKeep').addEventListener('click', () => {
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingDeleteId = null;
});
document.getElementById('confirmDelete').addEventListener('click', () => {
  if (pendingDeleteId !== null) {
    state.mantras = state.mantras.filter(m => m.id !== pendingDeleteId);
    if (state.selectedMantraId === pendingDeleteId) {
      state.selectedMantraId = state.mantras.length > 0 ? state.mantras[0].id : null;
    }
    saveState();
    renderMantras();
    pendingDeleteId = null;
  }
  document.getElementById('confirmOverlay').classList.remove('open');
});

// ===== MODAL =====
document.getElementById('addMantraBtn').addEventListener('click', () => {
  document.getElementById('newMantraName').value = '';
  document.getElementById('newMantraText').value = '';
  document.getElementById('newMantraIcon').value = '🌺';
  document.getElementById('modalOverlay').classList.add('open');
});
document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalSave').addEventListener('click', () => {
  const name = document.getElementById('newMantraName').value.trim();
  const text = document.getElementById('newMantraText').value.trim();
  const icon = document.getElementById('newMantraIcon').value.trim() || '🌺';
  if (!name || !text) return;
  const newM = { id: Date.now(), icon, name, text };
  state.mantras.push(newM);
  state.selectedMantraId = newM.id;
  saveState();
  renderMantras();
  document.getElementById('modalOverlay').classList.remove('open');
});

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  const sw = `
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(
    caches.open('mantra-v1').then(c =>
      c.addAll(['./', './index.html', './manifest.json'])
    )
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
  `;
  const blob = new Blob([sw], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url);
}

// ===== INIT =====
initStars();
renderMantras();
updateCountDisplay();
updateHomeTotals();
</script>
</body>
</html>
